{% extends 'base.html' %}

{% block title %}New Contact — BoothCRM{% endblock %}

{% block content %}

<div class="page-header">
    <div class="page-title-block">
        <h1>New Contact</h1>
        <div class="page-subtitle">Create a new contact</div>
    </div>
    <div class="page-actions">
        <a href="{% url 'contacts_list' %}" class="btn btn-ghost">← Cancel</a>
    </div>
</div>

<form method="POST">
    {% csrf_token %}
    <div class="grid-sidebar">

        <div>
            <div class="card mb-2">
                <div class="card-title">Identity</div>
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" name="first_name" required>
                </div>
                <div class="form-group">
                    <label>Last Name *</label>
                    <input type="text" name="last_name" required>
                </div>
                <div class="form-group">
                    <label>Preferred Name</label>
                    <input type="text" name="preferred_name">
                </div>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" name="title">
                </div>
                <div class="form-group">
                    <label>LinkedIn</label>
                    <input type="url" name="linkedin">
                </div>
            </div>

            <div class="card mb-2">
                <div class="card-title">Contact Info</div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email">
                </div>
                <div class="form-group">
                    <label>Email 2</label>
                    <input type="email" name="email2">
                </div>
                <div class="form-group">
                    <label>Email 3</label>
                    <input type="email" name="email3">
                </div>
                <div class="form-group">
                    <label>Mobile Phone</label>
                    <input type="text" name="mobile_phone">
                </div>
                <div class="form-group">
                    <label>Work Phone</label>
                    <input type="text" name="work_phone">
                </div>
                <div class="form-group">
                    <label>Home Phone</label>
                    <input type="text" name="home_phone">
                </div>
            </div>

            <div class="card mb-2">
                <div class="card-title">Address</div>
                <div class="form-group">
                    <label>Street Address</label>
                    <input type="text" name="address">
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" name="city">
                </div>
                <div class="form-group">
                    <label>State / Province</label>
                    <input type="text" name="state_province">
                </div>
                <div class="form-group">
                    <label>Country</label>
                    <input type="text" name="country">
                </div>
            </div>
        </div>

        <div>
            <div class="card mb-2">
                <div class="card-title">CRM</div>
                <div class="form-group">
                    <label>Status</label>
                    <select name="status">
                        {% for value, label in status_choices %}
                            <option value="{{ value }}" {% if value == 'active' %}selected{% endif %}>
                                {{ label }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Account</label>
                    <select name="account">
                        <option value="">— No Account —</option>
                        {% for account in accounts %}
                            <option value="{{ account.id }}">{{ account.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Contact Owner</label>
                    <select name="contact_owner">
                        <option value="">— Unassigned —</option>
                        {% for user in users %}
                            <option value="{{ user.id }}">{{ user.get_full_name|default:user.username }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Follow Up Date</label>
                    <input type="date" name="follow_up_date">
                </div>
                <div class="form-group">
                    <label>Primary Contact</label>
                    <select name="is_primary">
                        <option value="">No</option>
                        <option value="on">Yes</option>
                    </select>
                </div>
            </div>

            <div class="card mb-2">
                <div class="card-title">Notes & Outreach</div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea name="notes" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label>Outreach History</label>
                    <textarea name="outreach_history" rows="6"></textarea>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Create Contact</button>
        </div>

    </div>
</form>

{% endblock %}
