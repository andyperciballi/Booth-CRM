{% extends 'base.html' %}

{% block title %}Edit {{ contact.first_name }} {{ contact.last_name }} — BoothCRM{% endblock %}

{% block content %}

<div class="page-header">
    <div class="page-title-block">
        <h1>Edit Contact</h1>
        <div class="page-subtitle">{{ contact.first_name }} {{ contact.last_name }}</div>
    </div>
    <div class="page-actions">
        <a href="{% url 'contact_detail' contact.pk %}" class="btn btn-ghost">← Cancel</a>
    </div>
</div>

<form method="POST">
    {% csrf_token %}

    <div class="grid-sidebar">

        <!-- Left Column -->
        <div>
            <div class="card mb-2">
                <div class="card-title">Identity</div>
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" name="first_name" value="{{ contact.first_name }}" required>
                </div>
                <div class="form-group">
                    <label>Last Name *</label>
                    <input type="text" name="last_name" value="{{ contact.last_name }}" required>
                </div>
                <div class="form-group">
                    <label>Preferred Name</label>
                    <input type="text" name="preferred_name" value="{{ contact.preferred_name|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" name="title" value="{{ contact.title|default:'' }}">
                </div>
                <div class="form-group">
                    <label>LinkedIn</label>
                    <input type="url" name="linkedin" value="{{ contact.linkedin|default:'' }}">
                </div>
            </div>

            <div class="card mb-2">
                <div class="card-title">Contact Info</div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ contact.email|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Email 2</label>
                    <input type="email" name="email2" value="{{ contact.email2|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Email 3</label>
                    <input type="email" name="email3" value="{{ contact.email3|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Mobile Phone</label>
                    <input type="text" name="mobile_phone" value="{{ contact.mobile_phone|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Work Phone</label>
                    <input type="text" name="work_phone" value="{{ contact.work_phone|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Home Phone</label>
                    <input type="text" name="home_phone" value="{{ contact.home_phone|default:'' }}">
                </div>
            </div>

            <div class="card mb-2">
                <div class="card-title">Address</div>
                <div class="form-group">
                    <label>Street Address</label>
                    <input type="text" name="address" value="{{ contact.address|default:'' }}">
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" name="city" value="{{ contact.city|default:'' }}">
                </div>
                <div class="form-group">
                    <label>State / Province</label>
                    <input type="text" name="state_province" value="{{ contact.state_province|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Country</label>
                    <input type="text" name="country" value="{{ contact.country|default:'' }}">
                </div>
            </div>
        </div>

        <!-- Right Column -->
        <div>
            <div class="card mb-2">
                <div class="card-title">CRM</div>
                <div class="form-group">
                    <label>Status</label>
                    <select name="status">
                        {% for value, label in status_choices %}
                            <option value="{{ value }}" {% if contact.status == value %}selected{% endif %}>
                                {{ label }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Account</label>
                    <select name="account">
                        <option value="">— No Account —</option>
                        {% for account in accounts %}
                            <option value="{{ account.id }}" {% if contact.account.id == account.id %}selected{% endif %}>
                                {{ account.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Contact Owner</label>
                    <select name="contact_owner">
                        <option value="">— Unassigned —</option>
                        {% for user in users %}
                            <option value="{{ user.id }}" {% if contact.contact_owner.id == user.id %}selected{% endif %}>
                                {{ user.get_full_name|default:user.username }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Follow Up Date</label>
                    <input type="date" name="follow_up_date" value="{{ contact.follow_up_date|date:'Y-m-d'|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Primary Contact</label>
                    <select name="is_primary">
                        <option value="">No</option>
                        <option value="on" {% if contact.is_primary %}selected{% endif %}>Yes</option>
                    </select>
                </div>
            </div>

            <div class="card mb-2">
                <div class="card-title">Notes & Outreach</div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea name="notes" rows="4">{{ contact.notes|default:"" }}</textarea>
                </div>
                <div class="form-group">
                    <label>Outreach History</label>
                    <textarea name="outreach_history" rows="6">{{ contact.outreach_history|default:"" }}</textarea>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>

    </div>
</form>

{% endblock %}
