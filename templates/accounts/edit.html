{% extends 'base.html' %}

{% block title %}Edit {{ account.name }} — BoothCRM{% endblock %}

{% block content %}

<div class="page-header">
    <div class="page-title-block">
        <h1>Edit Account</h1>
        <div class="page-subtitle">{{ account.name }}</div>
    </div>
    <div class="page-actions">
        <a href="{% url 'account_detail' account.pk %}" class="btn btn-ghost">← Cancel</a>
    </div>
</div>

<form method="POST">
    {% csrf_token %}

    <div class="grid-sidebar">

        <!-- Left Column -->
        <div>
            <div class="card mb-2">
                <div class="card-title">Identity</div>
                <div class="form-group">
                    <label>Account Name *</label>
                    <input type="text" name="name" value="{{ account.name }}" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description">{{ account.description|default:"" }}</textarea>
                </div>
                <div class="form-group">
                    <label>Vertical</label>
                    <select name="vertical">
                        <option value="">— Select Vertical —</option>
                        {% for value, label in vertical_choices %}
                            <option value="{{ value }}" {% if account.vertical == value %}selected{% endif %}>
                                {{ label }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Website</label>
                    <input type="url" name="website" value="{{ account.website|default:'' }}">
                </div>
                <div class="form-group">
                    <label>HQ Phone</label>
                    <input type="text" name="hq_phone" value="{{ account.hq_phone|default:'' }}">
                </div>
                <div class="form-group">
                    <label>General Email</label>
                    <input type="email" name="general_email" value="{{ account.general_email|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Billing Email</label>
                    <input type="email" name="billing_email" value="{{ account.billing_email|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Billing Address</label>
                    <input type="text" name="billing_address" value="{{ account.billing_address|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Tax ID</label>
                    <input type="text" name="tax_id" value="{{ account.tax_id|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Employee Count</label>
                    <input type="number" name="employee_count" value="{{ account.employee_count|default:'' }}">
                </div>
            </div>
        </div>

        <!-- Right Column -->
        <div>
            <div class="card mb-2">
                <div class="card-title">Location</div>
                <div class="form-group">
                    <label>HQ Address</label>
                    <input type="text" name="hq_address" value="{{ account.hq_address|default:'' }}">
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" name="city" value="{{ account.city|default:'' }}">
                </div>
                <div class="form-group">
                    <label>State / Province</label>
                    <input type="text" name="state_province" value="{{ account.state_province|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Country</label>
                    <input type="text" name="country" value="{{ account.country|default:'' }}">
                </div>
            </div>

            <div class="card mb-2">
                <div class="card-title">CRM</div>
                <div class="form-group">
                    <label>Status</label>
                    <select name="status">
                        {% for value, label in status_choices %}
                            <option value="{{ value }}" {% if account.status == value %}selected{% endif %}>
                                {{ label }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>ARR</label>
                    <input type="number" name="arr" value="{{ account.arr|default:'' }}" step="0.01">
                </div>
                <div class="form-group">
                    <label>Account Owner</label>
                    <select name="account_owner">
                        <option value="">— Unassigned —</option>
                        {% for user in users %}
                            <option value="{{ user.id }}" {% if account.account_owner.id == user.id %}selected{% endif %}>
                                {{ user.get_full_name|default:user.username }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="card mb-2">
                <div class="card-title">Notes & Outreach</div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea name="notes" rows="4">{{ account.notes|default:"" }}</textarea>
                </div>
                <div class="form-group">
                    <label>Outreach History</label>
                    <textarea name="outreach_history" rows="6">{{ account.outreach_history|default:"" }}</textarea>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>

    </div>
</form>

{% endblock %}
