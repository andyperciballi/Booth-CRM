<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BoothCRM{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>

    <nav>
        <span class="logo">⬡ BoothCRM</span>
        {% if request.user.is_authenticated %}
        <a href="{% url 'dashboard' %}">Dashboard</a>
        {% endif %}
        <a href="{% url 'accounts_list' %}">Accounts</a>
        <a href="{% url 'contacts_list' %}">Contacts</a>
        <a href="{% url 'opportunities_list' %}">Opportunities</a>
        <a href="{% url 'events_list' %}">Events</a>
        {% if request.user.is_authenticated %}
            <div class="nav-user">{{ request.user.username }}</div>
            <form method="POST" action="{% url 'logout' %}" style="display:inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-ghost" style="font-size:11px">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}" class="btn btn-ghost" style="font-size:11px">Staff Login</a>
        {% endif %}
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
