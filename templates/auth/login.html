{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — BoothCRM</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
    <div class="login-subtitle" style="margin-top:16px">
</div>
    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-logo">⬡ BoothCRM</div>
            <div class="login-subtitle">Sign in to your account</div>

            {% if form.errors %}
                <div class="error-msg">
                    Invalid username or password. Please try again.
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_username">Username</label>
                    <input type="text" name="username" id="id_username"
                           placeholder="Enter your username" autofocus>
                </div>
                <div class="form-group">
                    <label for="id_password">Password</label>
                    <input type="password" name="password" id="id_password"
                           placeholder="Enter your password">
                </div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>
            <a href="{% url 'accounts_list' %}" class="btn btn-ghost" style="display:block; text-align:center; margin-top:12px">← Back to Browse</a>
        </div>
    </div>
</body>
</html>
