{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — BoothCRM</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-logo">⬡ BoothCRM</div>
            <div class="login-subtitle">Create a viewer account</div>

            {% if error %}
                <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="Your email address">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password1" placeholder="Choose a password" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="password2" placeholder="Confirm your password" required>
                </div>
                <button type="submit" class="login-btn">Create Account</button>
            </form>

            <div class="login-subtitle" style="margin-top:16px">
                Already have an account? <a href="{% url 'login' %}">Sign in</a>
            </div>
        </div>
    </div>
</body>
</html>
